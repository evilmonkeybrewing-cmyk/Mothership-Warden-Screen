<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mothership — Warden Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #08090a; --hull: #111418; --panel: #181d22;
    --green: #39ff14; --green-dim: #1a7a08; --green-muted: #0d4005;
    --amber: #ffb300; --red: #ff3333; --red-dim: #7a0000;
    --blue: #00aaff; --text: #c8d8c0; --text-muted: #607060;
    --border: #1e2e1e; --border-strong: #2a4a2a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --void: #e8f0e8; --hull: #d8e8d8; --panel: #ccdccc;
      --green: #1a6010; --green-dim: #2a8020; --green-muted: #c0e0b8;
      --amber: #7a5000; --red: #aa0000; --red-dim: #ffcccc;
      --blue: #005080; --text: #182818; --text-muted: #506050;
      --border: #a0c0a0; --border-strong: #608060;
    }
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes terminalGlow {
    0%,100% { text-shadow: 0 0 6px rgba(57,255,20,0.5); }
    50% { text-shadow: 0 0 20px rgba(57,255,20,1), 0 0 40px rgba(57,255,20,0.4); }
  }
  @keyframes scanIn {
    from { opacity: 0; letter-spacing: 8px; }
    to   { opacity: 1; letter-spacing: 4px; }
  }
  @keyframes flicker {
    0%{opacity:1} 5%{opacity:0.8} 10%{opacity:1} 15%{opacity:0.5}
    20%{opacity:1} 80%{opacity:1} 85%{opacity:0.9} 90%{opacity:1} 100%{opacity:1}
  }
  @keyframes pulseRed {
    0%,100%{box-shadow:0 0 4px rgba(255,51,51,0.3)}
    50%{box-shadow:0 0 14px rgba(255,51,51,0.8)}
  }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
  }

  .screen { padding: 10px; max-width: 1200px; margin: 0 auto; }

  .screen-header {
    text-align: center; padding: 10px 0 12px;
    border-bottom: 1px solid var(--border-strong);
    margin-bottom: 10px;
    animation: fadeInUp 0.6s ease both;
  }
  .screen-header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px; color: var(--green);
    letter-spacing: 4px; text-transform: uppercase;
    animation: scanIn 1s ease both, terminalGlow 3s 1s ease-in-out infinite;
  }
  .blink { animation: blink 1.1s step-end infinite; color: var(--green); }
  .screen-header p {
    font-size: 11px; color: var(--text-muted);
    margin-top: 3px; letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
    animation: fadeInUp 0.8s 0.5s ease both;
  }

  .tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .tab-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    padding: 5px 10px; background: var(--hull);
    border: 1px solid var(--border-strong); border-radius: 2px;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px;
  }
  .tab-btn:hover { color: var(--green); border-color: var(--green); background: var(--green-muted); }
  .tab-btn.active { background: var(--green-muted); color: var(--green); border-color: var(--green); }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeInUp 0.25s ease both; }

  .col-grid { display: grid; gap: 8px; }
  .cols-2 { grid-template-columns: 1fr 1fr; }
  .cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .card {
    background: var(--hull); border: 1px solid var(--border);
    border-radius: 3px; padding: 9px 11px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--green-dim); }
  .card h3 {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--green); letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 4px; margin-bottom: 7px;
  }

  .rule-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 2.5px 0; border-bottom: 1px solid var(--border);
    font-size: 12px; gap: 6px;
  }
  .rule-row:last-child { border-bottom: none; }
  .rule-label { color: var(--amber); font-weight: 500; flex-shrink: 0; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .rule-val { color: var(--text); text-align: right; font-size: 11.5px; }

  .step-list { list-style: none; }
  .step-list li {
    display: flex; gap: 7px; padding: 3px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
    align-items: flex-start; line-height: 1.4;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-num {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    color: var(--void); background: var(--green);
    border-radius: 1px; width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }

  .warn-box {
    background: var(--red-dim); border: 1px solid var(--red);
    border-left: 3px solid var(--red); border-radius: 2px;
    padding: 6px 9px; font-size: 12px; color: #ffaaaa;
    margin-top: 5px; line-height: 1.5;
    font-family: 'Share Tech Mono', monospace;
    animation: pulseRed 3s ease-in-out infinite;
  }
  .warn-box strong { color: var(--red); }

  .info-box {
    background: var(--green-muted); border: 1px solid var(--green-dim);
    border-left: 3px solid var(--green); border-radius: 2px;
    padding: 6px 9px; font-size: 12px; color: var(--text);
    margin-top: 5px; line-height: 1.5;
  }
  .info-box strong { color: var(--green); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
  .note { font-size: 11px; color: var(--text-muted); font-family: 'Share Tech Mono', monospace; margin-top: 3px; line-height: 1.4; }

  .faction-item {
    padding: 5px 8px; border-radius: 2px; background: var(--panel);
    border: 1px solid var(--border); border-left: 2px solid var(--amber);
    margin-bottom: 4px; font-size: 12px;
    transition: border-left-color 0.2s, transform 0.2s;
  }
  .faction-item:hover { border-left-color: var(--green); transform: translateX(2px); }
  .faction-name { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--amber); letter-spacing: 1px; }
  .faction-desc { color: var(--text-muted); margin-top: 1px; font-size: 11px; }

  .phase-row {
    padding: 4px 8px; border-radius: 2px; margin-bottom: 3px;
    font-size: 11.5px; border: 1px solid var(--border);
  }
  .phase-1 { background: #1a1500; border-left: 3px solid var(--amber); }
  .phase-2 { background: #1a0800; border-left: 3px solid #ff6600; }
  .phase-3 { background: var(--red-dim); border-left: 3px solid var(--red); animation: pulseRed 4s ease-in-out infinite; }
  .phase-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--amber); letter-spacing: 1px; display: block; margin-bottom: 2px; }

  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .loc-item { padding: 5px 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 2px; transition: border-color 0.2s; }
  .loc-item:hover { border-color: var(--blue); }
  .loc-name { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--blue); letter-spacing: 1px; display: block; }
  .loc-desc { color: var(--text-muted); font-size: 11px; margin-top: 1px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .data-table th { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--green); text-align: left; padding: 3px 5px; border-bottom: 1px solid var(--border-strong); letter-spacing: 1px; }
  .data-table td { padding: 3px 5px; border-bottom: 1px solid var(--border); color: var(--text-muted); vertical-align: top; }
  .data-table tr:last-child td { border-bottom: none; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
  .stat-item { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; padding: 5px 8px; text-align: center; }
  .stat-name { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 1px; display: block; }
  .stat-val { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--green); font-weight: 700; animation: terminalGlow 4s ease-in-out infinite; }

  .acmd-row { padding: 2px 5px; font-size: 11.5px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .acmd-row:last-child { border-bottom: none; }
  .acmd-lvl { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--amber); width: 28px; flex-shrink: 0; }
  .acmd-10 .acmd-lvl { color: var(--red); animation: blink 1s step-end infinite; }
  .acmd-10 { color: #ffaaaa; }

  @media (max-width: 700px) { .cols-3 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .cols-2, .cols-3 { grid-template-columns: 1fr; } .location-grid, .stat-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="screen">
  <div class="screen-header">
    <h1>MOTHERSHIP <span class="blink">▮</span> WARDEN SCREEN</h1>
    <p>// PROSPERO'S DREAM — A POUND OF FLESH // 1E RULES REFERENCE //</p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<script>
const panels = {
  rules: `<div class="col-grid cols-3">
    <div class="card"><h3>Core Resolution</h3>
      <div class="rule-row"><span class="rule-label">ROLL UNDER</span><span class="rule-val">Roll d100 under Stat or Save to succeed</span></div>
      <div class="rule-row"><span class="rule-label">SKILL BONUS</span><span class="rule-val">Trained +10 / Expert +15 / Master +20 (added to Stat before rolling)</span></div>
      <div class="rule-row"><span class="rule-label">ADVANTAGE [+]</span><span class="rule-val">Roll twice, take better result</span></div>
      <div class="rule-row"><span class="rule-label">DISADVANTAGE [-]</span><span class="rule-val">Roll twice, take worse result</span></div>
      <div class="rule-row"><span class="rule-label">90–99</span><span class="rule-val">Always a failure regardless of stat</span></div>
      <div class="rule-row"><span class="rule-label">CRIT SUCCESS</span><span class="rule-val">Doubles on a successful roll — something very good happens</span></div>
      <div class="rule-row"><span class="rule-label">CRIT FAILURE</span><span class="rule-val">Doubles on a failed roll — trigger Panic Check</span></div>
      <div class="rule-row"><span class="rule-label">CRITICAL SUCCESS</span><span class="rule-val">Doubles on a successful roll — something very good happens. Warden's call.</span></div>
      <div class="info-box"><strong>WHEN TO ROLL:</strong> Only roll when failure is interesting AND the outcome is uncertain. Best play avoids rolling entirely — right tool, right plan, right crew.</div>
    </div>
    <div class="card"><h3>Stress &amp; Panic</h3>
      <div class="rule-row"><span class="rule-label">GAIN STRESS</span><span class="rule-val">On any failed roll. Also from specific events and wounds.</span></div>
      <div class="rule-row"><span class="rule-label">PANIC CHECK</span><span class="rule-val">Triggered by Critical Failure. Roll d20 Panic Die.</span></div>
      <div class="rule-row"><span class="rule-label">PANIC RESULT</span><span class="rule-val">If d20 ≤ current Stress → consult Panic Table (PSG p.21)</span></div>
      <div class="rule-row"><span class="rule-label">MARINES</span><span class="rule-val">When Marine panics, ALL close friendlies make Fear Save</span></div>
      <div class="rule-row"><span class="rule-label">ANDROIDS</span><span class="rule-val">Close friendlies at [-] on all rolls while Android is near</span></div>
      <div class="rule-row"><span class="rule-label">RELIEVE STRESS</span><span class="rule-val">Rest in safe area — roll worst Save to reduce by a few points</span></div>
      <div class="rule-row"><span class="rule-label">SHORE LEAVE</span><span class="rule-val">Convert Stress into improved Saves. Treat Conditions. Train skills.</span></div>
      <div class="warn-box"><strong>STRESS→PANIC→DEATH:</strong> Failure causes Stress, Stress makes Panic more likely, Panic causes Conditions. Horror is procedural — let it escalate.</div>
    </div>
    <div class="card"><h3>Health &amp; Wounds</h3>
      <div class="rule-row"><span class="rule-label">HEALTH</span><span class="rule-val">1d10+10. Resets to max each Wound. Starts at max, zero Wounds.</span></div>
      <div class="rule-row"><span class="rule-label">WOUNDS</span><span class="rule-val">Start at 2 max. When Health hits 0 → suffer a Wound. Reset Health.</span></div>
      <div class="rule-row"><span class="rule-label">WOUND TABLE</span><span class="rule-val">Roll on Wounds Table (PSG p.29) per Wound category taken</span></div>
      <div class="rule-row"><span class="rule-label">ARMOR POINTS</span><span class="rule-val">Damage under AP = ignored. Damage over AP = Armor destroyed, full damage taken</span></div>
      <div class="rule-row"><span class="rule-label">DEATH SAVE</span><span class="rule-val">When out of Wounds — roll 1d10 under a cup. Hidden result.</span></div>
      <div class="rule-row"><span class="rule-label">BLEEDING</span><span class="rule-val">1 DMG/round until stopped. Cumulative (Bleeding +2 = 3 DMG/round)</span></div>
      <div class="rule-row"><span class="rule-label">COVER</span><span class="rule-val">Acts like Armor (AP 5 insignificant; more for solid). Destroyed like Armor.</span></div>
      <div class="info-box"><strong>CLASSES START WITH:</strong> Wounds 2 / Min Stress 2 / Health 1d10+10. Marines get extra Wound from class skill tree.</div>
    </div>
  </div>`,

  combat: `<div class="col-grid cols-3">
    <div class="card"><h3>Combat Sequence</h3>
      <ul class="step-list">
        <li><span class="step-num">1</span><span><strong>Declare:</strong> Everyone declares actions before rolling. No take-backs.</span></li>
        <li><span class="step-num">2</span><span><strong>Speed Save:</strong> Highest Speed acts first. Speed Save determines order if contested.</span></li>
        <li><span class="step-num">3</span><span><strong>Attack:</strong> Roll Combat Stat (+ skill bonus) to hit. Success = roll damage.</span></li>
        <li><span class="step-num">4</span><span><strong>Damage:</strong> Reduce target's Health. Health hits 0 → suffer a Wound, reset Health minus carryover.</span></li>
        <li><span class="step-num">5</span><span><strong>Armor:</strong> Damage less than AP = ignored. Damage ≥ AP = Armor gone, take full damage.</span></li>
        <li><span class="step-num">6</span><span><strong>Actions:</strong> 2 actions per round. Attack, Move, Aim, Reload, First Aid, Use Item, etc.</span></li>
      </ul>
      <div class="warn-box"><strong>VIOLENCE IS A TRAP:</strong> Characters die fast. A good plan avoids combat. A bad plan ends careers.</div>
    </div>
    <div class="card"><h3>Weapons Quick Ref</h3>
      <table class="data-table">
        <tr><th>Weapon</th><th>DMG</th><th>Range</th><th>Notes</th></tr>
        <tr><td>Crowbar</td><td>1d5</td><td>Adjacent</td><td>Blunt Force. [+] on Strength checks to open things.</td></tr>
        <tr><td>Boarding Axe</td><td>2d10</td><td>Adjacent</td><td>Gore [+]</td></tr>
        <tr><td>Combat Shotgun</td><td>4d10</td><td>Close</td><td>1d10 DMG at Long Range+. 4 shots.</td></tr>
        <tr><td>Stun Baton</td><td>Special</td><td>Adjacent</td><td>Body Save or Stunned</td></tr>
        <tr><td>Loader Claws</td><td>1 Wound</td><td>Adjacent</td><td>Exoskeleton. 4 arms. 5000kg lift. 48hr battery.</td></tr>
        <tr><td>Breaching Charge</td><td>1 Wound</td><td>Blast</td><td>Body Save or Wound (Explosive). Blows airlocks.</td></tr>
      </table>
      <div class="divider"></div>
      <div class="rule-row"><span class="rule-label">RANGES</span><span class="rule-val">Close (can touch/reach) → Long (20–100m) → Extreme (100m+)</span></div>
      <div class="rule-row"><span class="rule-label">CRIT HIT</span><span class="rule-val">Doubles on successful Combat roll — roll on crit table (Warden's Screen)</span></div>
    </div>
    <div class="card"><h3>NPCs &amp; Creatures</h3>
      <div class="rule-row"><span class="rule-label">COMBAT</span><span class="rule-val">NPCs use their Combat stat for all attacks</span></div>
      <div class="rule-row"><span class="rule-label">INSTINCT</span><span class="rule-val">Used for all non-combat checks (Fear, Sanity, Body, Speed, Intellect)</span></div>
      <div class="rule-row"><span class="rule-label">MAX WOUNDS</span><span class="rule-val">Any damage taken = 1 Wound for most creatures. Check stat block.</span></div>
      <div class="rule-row"><span class="rule-label">LOYALTY SAVE</span><span class="rule-val">Rolled when NPC must choose between self-interest and mission</span></div>
      <div class="rule-row"><span class="rule-label">CHOKESPAWN</span><span class="rule-val">ACMD Phase 3 horror. Body Save on contact or take Infection Check.</span></div>
      <div class="divider"></div>
      <div class="rule-row"><span class="rule-label">LOSHE</span><span class="rule-val">C:55 / I:60 / W:3(40) — Exoskeleton, 4 arms, each attacks separately. Worth 300kcr.</span></div>
      <div class="rule-row"><span class="rule-label">Babushka</span><span class="rule-val">C:65 / W:2(45) — Cyber Savant: On hit, shuts down one target cybermod for encounter.</span></div>
      <div class="info-box" style="margin-top:5px"><strong>Toxic/Vacuum:</strong> No rebreather = 1d10 DMG/round. Body Save halves it. Androids don't need oxygen.</div>
    </div>
  </div>`,

  dream: `<div class="col-grid cols-2">
    <div class="card"><h3>Prospero's Dream — Locations</h3>
      <div class="location-grid">
        <div class="loc-item"><span class="loc-name">THE RECOVERY ROOM</span><span class="loc-desc">Babushka's clinic. 100cr/day. Zhenya (AI child) handles bedside manner. ACMD quarantine in OR-7.</span></div>
        <div class="loc-item"><span class="loc-name">THE FARM</span><span class="loc-desc">Solarian Church Sycorax facility. Managed by Ukko/Ukka. Talk to no one else.</span></div>
        <div class="loc-item"><span class="loc-name">THE CHOKE</span><span class="loc-desc">Lowest, darkest level. ACMD epicenter. Dr. Bancali operates illegally. Chokespawn lurk in muck.</span></div>
        <div class="loc-item"><span class="loc-name">DOPTOWN</span><span class="loc-desc">Black market district. Imogene Kane rumored here. Find Dr. Bancali through asking around.</span></div>
        <div class="loc-item"><span class="loc-name">THE ICE BOX</span><span class="loc-desc">Private slickworld servers. Hideo Kieslowski hiding here for 10+ years. Key to solving ACMD.</span></div>
        <div class="loc-item"><span class="loc-name">THE DOCKS</span><span class="loc-desc">X-Class port. Repairs 2x cost. 50% down required. 1d5x turnaround. 10% cargo stolen. Loshe watches all.</span></div>
        <div class="loc-item"><span class="loc-name">LOCAL 32819L</span><span class="loc-desc">Teamster union hall. Reidmar runs it. Strike organizing underway. Kleyman (informant) here.</span></div>
        <div class="loc-item"><span class="loc-name">GOLYONOVO HQ</span><span class="loc-desc">Yandee's operation. Droogs recruited here. SECRET: Yandee is an android.</span></div>
      </div>
    </div>
    <div class="card"><h3>Key NPCs</h3>
      <table class="data-table">
        <tr><th>NPC</th><th>Faction</th><th>Need to Know</th></tr>
        <tr><td>Yandee</td><td>Bratva Boss</td><td>Head of Golyonovo II Bratva. SECRET: is an android. Reidmar wants to use this as leverage.</td></tr>
        <tr><td>Reidmar</td><td>Teamsters Boss</td><td>Head of Local 32819L. Ambitious. His freighters captured by Stratemeyer Syndicate.</td></tr>
        <tr><td>Cutter</td><td>Tempest Co.</td><td>Mercenary commander. Suspicious of Yandee. Looking to overthrow them.</td></tr>
        <tr><td>Babushka</td><td>Independent</td><td>Legendary cybermod surgeon. Clinically detached. Investigating ACMD. Zhenya is her AI child avatar.</td></tr>
        <tr><td>Ukko/Ukka</td><td>The Farm</td><td>Run Sycorax production. Hunglung sympathizer. Only contact for Sycorax pickup.</td></tr>
        <tr><td>Loshe</td><td>Dockmaster</td><td>Oversees all ships. Exoskeleton-equipped. Every incoming crew goes through them.</td></tr>
        <tr><td>Kleyman</td><td>Bratva informant</td><td>Novo informant in the union. Organizing scab labor against potential strike.</td></tr>
        <tr><td>Dr. Bancali</td><td>Independent</td><td>Rogue doctor in The Choke. Knows about ACMD. Find through Doptown.</td></tr>
        <tr><td>H. Kieslowski</td><td>Independent</td><td>Reclusive genius. In slickworld 10+ years. Key to solving ACMD. Hard to reach.</td></tr>
        <tr><td>Imogene Kane</td><td>Independent</td><td>Rumored in Doptown. Planning an uprising. Valuable contact (50kcr mission fee).</td></tr>
      </table>
      <div class="info-box" style="margin-top:6px"><strong>DENIZENS TABLE:</strong> All NPCs have their own agendas. Ask "what do they want?" before every scene. The Dream breathes because everyone has skin in the game.</div>
    </div>
  </div>`,

  factions: `<div class="col-grid cols-3">
    <div class="card"><h3>Faction Web</h3>
      <div class="faction-item"><span class="faction-name">GOLYONOVO II BRATVA</span><span class="faction-desc">The overarching crime org. Yandee leads. Controls distribution, muscle, and the church. Everyone answers to them — or pretends to.</span></div>
      <div class="faction-item"><span class="faction-name">TEAMSTERS — LOCAL 32819L</span><span class="faction-desc">Drug distribution for the Bratva. Reidmar runs the union. Strike looming. Fleet captured by Stratemeyer Syndicate.</span></div>
      <div class="faction-item"><span class="faction-name">TEMPEST CO.</span><span class="faction-desc">Bratva's hired muscle. Commander Cutter runs it. Growing suspicious of Yandee. Could be flipped or go rogue.</span></div>
      <div class="faction-item"><span class="faction-name">EVANGELICAL SOLARIANS</span><span class="faction-desc">The station's church. Produces Sycorax at The Farm. Appear devout, serve the Bratva. Ukko/Ukka manage operations.</span></div>
      <div class="faction-item"><span class="faction-name">STRATEMEYER SYNDICATE</span><span class="faction-desc">Rival crime org. Captured Reidmar's fleet. Holding Teamsters hostage. Main external pressure driving the timeline.</span></div>
      <div class="info-box" style="margin-top:5px"><strong>THE CRACKS:</strong> Every faction is at each other's throats. PCs live in those cracks. Play factions against each other, collect favors, survive the fallout.</div>
    </div>
    <div class="card"><h3>Timeline of Events</h3>
      <p class="note" style="margin-bottom:6px">// THESE HAPPEN IF PCs DO NOTHING //</p>
      <div class="phase-row phase-1"><span class="phase-label">PHASE 1 — TENSION</span>Stratemeyer captures Reidmar's fleet. He demands Yandee send Tempest Co. Yandee stalls. Strike threatened. First Chokespawn caught on camera.</div>
      <div class="phase-row phase-2"><span class="phase-label">PHASE 2 — BREAKING POINT</span>Stratemeyer executes Teamsters on camera. Strike called. Yandee imports scabs. Tempest acts as strikebreakers. O2 debt in The Choke called in — pay in 24hrs or bombings. 2d100 die.</div>
      <div class="phase-row phase-3"><span class="phase-label">PHASE 3 — COLLAPSE</span>Full war between Teamsters and Tempest Co. 2d10 die in strange circumstances. ACMD spreads openly. Chokespawn multiply. Caliban stirs in OR-7.</div>
      <div class="warn-box" style="margin-top:6px"><strong>SYCORAX:</strong> The drug makes cybermod installation painless and easy. Without it, mods become dangerous to install. The church controls the supply.</div>
    </div>
    <div class="card"><h3>ACMD Infection</h3>
      <div class="rule-row"><span class="rule-label">INFECTION CHECK</span><span class="rule-val">Body Save when exposed. Fail = infected. Track level 01–10.</span></div>
      <div class="rule-row"><span class="rule-label">SPREADING</span><span class="rule-val">Infected can spread ACMD to others within 10m (Body Save or check)</span></div>
      <div class="rule-row"><span class="rule-label">TREATMENT</span><span class="rule-val">Babushka's Recovery Room. Rest + Body Save to reduce infection by 1.</span></div>
      <div class="divider"></div>
      <div class="acmd-row"><span class="acmd-lvl">01</span><span>All Body Saves at [-]</span></div>
      <div class="acmd-row"><span class="acmd-lvl">02</span><span>Body Save or coughing fit 1d5 rds. Others within 10m make Infection Check</span></div>
      <div class="acmd-row"><span class="acmd-lvl">03</span><span>Fever &amp; Chills. 1d10 DMG per day</span></div>
      <div class="acmd-row"><span class="acmd-lvl">04</span><span>Random Mutation</span></div>
      <div class="acmd-row"><span class="acmd-lvl">05</span><span>Frailty. All Strength &amp; Speed Checks at [-]. Mutation.</span></div>
      <div class="acmd-row"><span class="acmd-lvl">06</span><span>2d10 DMG per day. Random Malfunction</span></div>
      <div class="acmd-row"><span class="acmd-lvl">07</span><span>Panic Check. [+] on Reaping Checks until cured. Mutation.</span></div>
      <div class="acmd-row"><span class="acmd-lvl">08</span><span>Install 1 cybermod/week or gain 2d10 Stress. Mutation.</span></div>
      <div class="acmd-row"><span class="acmd-lvl">09</span><span>Body Save or spew infectious Nanoswarm. 20m radius Infection Check [-]</span></div>
      <div class="acmd-row acmd-10"><span class="acmd-lvl">10</span><span>LOSE CONTROL. Transform into Chokespawn.</span></div>
    </div>
  </div>`,

  cybermods: `<div class="col-grid cols-3">
    <div class="card"><h3>Cybermod Rules</h3>
      <div class="rule-row"><span class="rule-label">INSTALL COST</span><span class="rule-val">Per mod card. Babushka charges market rate. Black market = cheaper but riskier.</span></div>
      <div class="rule-row"><span class="rule-label">DR. BANCALI</span><span class="rule-val">Installs mods in The Choke. Illegal, cheap. Risk of ACMD contamination.</span></div>
      <div class="rule-row"><span class="rule-label">SYCORAX</span><span class="rule-val">Makes mod installation painless and easy. Without it, installation risk increases.</span></div>
      <div class="rule-row"><span class="rule-label">DEBT HOOK</span><span class="rule-val">Starting PCs can borrow up to 250kcr for mods — great motivation for taking dangerous jobs.</span></div>
      <div class="rule-row"><span class="rule-label">MALFUNCTION</span><span class="rule-val">ACMD or critical failures can cause Random Malfunction on installed mods</span></div>
      <div class="rule-row"><span class="rule-label">SHUTDOWN</span><span class="rule-val">Babushka's Cyber Savant: on a hit, disables any one cybermod for the encounter.</span></div>
      <div class="info-box" style="margin-top:6px"><strong>CORPORATE LICENSING:</strong> Mods are technically licensed — corporations may theoretically override them. Play this up for horror and paranoia.</div>
    </div>
    <div class="card"><h3>Jobs &amp; Pay</h3>
      <table class="data-table">
        <tr><th>Job</th><th>Pay</th></tr>
        <tr><td>Infiltrate Local 32819L, find dirt on Reidmar</td><td>150kcr</td></tr>
        <tr><td>Infiltrate Bratva, become Droog, report to Angus</td><td>250kcr</td></tr>
        <tr><td>Find Farm Two's Sycorax formula</td><td>2mcr</td></tr>
        <tr><td>Contact Imogene Kane in Doptown</td><td>50kcr</td></tr>
        <tr><td>Locate Dr. Bancali (ask around Doptown)</td><td>100kcr</td></tr>
        <tr><td>Convince Kieslowski to return re: ACMD</td><td>—</td></tr>
        <tr><td>Pick up 1–4 infected corpses for Babushka</td><td>2kcr/ea</td></tr>
        <tr><td>Sycorax pickup from The Farm</td><td>3kcr</td></tr>
        <tr><td>House call — collect evidence, don't get sick</td><td>15kcr</td></tr>
        <tr><td>Find Bancali, report on ACMD</td><td>Free cybermod</td></tr>
        <tr><td>Protection payment collection (to Yandee)</td><td>500cr</td></tr>
      </table>
    </div>
    <div class="card"><h3>Saves Reference</h3>
      <div class="stat-grid">
        <div class="stat-item"><span class="stat-name">SANITY SAVE</span><span class="stat-val">2d10+10</span></div>
        <div class="stat-item"><span class="stat-name">FEAR SAVE</span><span class="stat-val">2d10+10</span></div>
        <div class="stat-item"><span class="stat-name">BODY SAVE</span><span class="stat-val">2d10+10</span></div>
        <div class="stat-item"><span class="stat-name">SPEED SAVE</span><span class="stat-val">varies</span></div>
      </div>
      <div class="divider"></div>
      <div class="rule-row"><span class="rule-label">SANITY SAVE</span><span class="rule-val">Triggered by alien weirdness, incomprehensible things, Void horrors</span></div>
      <div class="rule-row"><span class="rule-label">FEAR SAVE</span><span class="rule-val">Triggered by violence, gore, jump scares, Marines panicking nearby</span></div>
      <div class="rule-row"><span class="rule-label">BODY SAVE</span><span class="rule-val">Physical resilience — toxic atmospheres, ACMD, radiation, exhaustion</span></div>
      <div class="rule-row"><span class="rule-label">SHORE LEAVE</span><span class="rule-val">Convert Stress to Save improvements. No XP — trauma IS progression.</span></div>
      <div class="warn-box" style="margin-top:5px"><strong>CLASSES:</strong> Marine — combat, Wound resistance, spreads panic. Scientist — medicine, research, field surgery. Android — high stats, unsettles others. Teamster — engineering, grit, survival.</div>
    </div>
  </div>`
};

const tabs = [
  {id:'rules', label:'Core Rules'},
  {id:'combat', label:'Combat'},
  {id:'dream', label:"Prospero's Dream"},
  {id:'factions', label:'Factions & Timeline'},
  {id:'cybermods', label:'Mods, Jobs & Saves'},
];

const tc = document.getElementById('tabs');
const pc = document.getElementById('panels');
tabs.forEach((t,i) => {
  const b = document.createElement('button');
  b.className = 'tab-btn' + (i===0?' active':'');
  b.textContent = t.label;
  b.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('p-'+t.id).classList.add('active');
  };
  tc.appendChild(b);
  const p = document.createElement('div');
  p.className = 'panel' + (i===0?' active':'');
  p.id = 'p-'+t.id;
  p.innerHTML = panels[t.id];
  pc.appendChild(p);
});
</script>
</body>
</html>
