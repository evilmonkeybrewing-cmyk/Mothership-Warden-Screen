
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --void:#08090a;--hull:#111418;--panel:#181d22;--scan:#1a2a1a;
    --green:#39ff14;--green-dim:#1a7a08;--green-muted:#0d4005;
    --amber:#ffb300;--amber-dim:#7a5000;--red:#ff3333;--red-dim:#7a0000;
    --blue:#00aaff;--text:#c8d8c0;--text-muted:#607060;--border:#1e2e1e;
    --border-strong:#2a4a2a;
  }
  @media(prefers-color-scheme:light){
    :root{
      --void:#e8f0e8;--hull:#d8e8d8;--panel:#ccdccc;--scan:#c0d8c0;
      --green:#1a6010;--green-dim:#2a8020;--green-muted:#c0e0b8;
      --amber:#7a5000;--amber-dim:#b87800;--red:#aa0000;--red-dim:#cc2222;
      --blue:#005080;--text:#182818;--text-muted:#506050;--border:#a0c0a0;
      --border-strong:#608060;
    }
  }
  body{background:var(--void);color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px}
  .screen{padding:10px;max-width:1200px;margin:0 auto}
  .screen-header{text-align:center;padding:10px 0 12px;border-bottom:1px solid var(--border-strong);margin-bottom:10px;position:relative}
  .screen-header h1{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--green);letter-spacing:4px;text-transform:uppercase}
  .screen-header p{font-size:11px;color:var(--text-muted);margin-top:3px;letter-spacing:1px;font-family:'Share Tech Mono',monospace}
  .blink{animation:blink 1.4s step-end infinite;color:var(--green)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
  .tab-btn{font-family:'Share Tech Mono',monospace;font-size:10px;padding:5px 10px;background:var(--hull);border:1px solid var(--border-strong);border-radius:2px;color:var(--text-muted);cursor:pointer;transition:all 0.1s;text-transform:uppercase;letter-spacing:1px}
  .tab-btn:hover{color:var(--green);border-color:var(--green)}
  .tab-btn.active{background:var(--green-muted);color:var(--green);border-color:var(--green)}
  .panel{display:none}.panel.active{display:block}
  .col-grid{display:grid;gap:8px}.cols-2{grid-template-columns:1fr 1fr}.cols-3{grid-template-columns:1fr 1fr 1fr}
  .card{background:var(--hull);border:1px solid var(--border);border-radius:3px;padding:9px 11px}
  .card h3{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border-strong);padding-bottom:4px;margin-bottom:7px}
  .rule-row{display:flex;justify-content:space-between;align-items:baseline;padding:2.5px 0;border-bottom:1px solid var(--border);font-size:12px;gap:6px}
  .rule-row:last-child{border-bottom:none}
  .rule-label{color:var(--amber);font-weight:500;flex-shrink:0;font-family:'Share Tech Mono',monospace;font-size:11px}
  .rule-val{color:var(--text);text-align:right;font-size:11.5px}
  .step-list{list-style:none}
  .step-list li{display:flex;gap:7px;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start;line-height:1.4}
  .step-list li:last-child{border-bottom:none}
  .step-num{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--void);background:var(--green);border-radius:1px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .warn-box{background:var(--red-dim);border:1px solid var(--red);border-left:3px solid var(--red);border-radius:2px;padding:6px 9px;font-size:12px;color:#ffaaaa;margin-top:5px;line-height:1.5;font-family:'Share Tech Mono',monospace}
  .warn-box strong{color:var(--red)}
  .info-box{background:var(--green-muted);border:1px solid var(--green-dim);border-left:3px solid var(--green);border-radius:2px;padding:6px 9px;font-size:12px;color:var(--text);margin-top:5px;line-height:1.5}
  .info-box strong{color:var(--green)}
  .divider{border:none;border-top:1px solid var(--border);margin:6px 0}
  .note{font-size:11px;color:var(--text-muted);font-family:'Share Tech Mono',monospace;margin-top:3px;line-height:1.4}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
  .stat-item{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:5px 8px;text-align:center}
  .stat-name{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;display:block}
  .stat-val{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--green);font-weight:700}
  .faction-item{padding:5px 8px;border-radius:2px;background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--amber);margin-bottom:4px;font-size:12px}
  .faction-name{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:1px}
  .faction-desc{color:var(--text-muted);margin-top:1px;font-size:11px}
  .phase-row{padding:4px 8px;border-radius:2px;margin-bottom:3px;font-size:11.5px;border:1px solid var(--border)}
  .phase-1{background:#1a1500;border-left:3px solid var(--amber)}
  .phase-2{background:#1a0800;border-left:3px solid #ff6600}
  .phase-3{background:var(--red-dim);border-left:3px solid var(--red)}
  .phase-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:1px;display:block;margin-bottom:2px}
  .location-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .loc-item{padding:5px 8px;background:var(--panel);border:1px solid var(--border);border-radius:2px}
  .loc-name{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:1px;display:block}
  .loc-desc{color:var(--text-muted);font-size:11px;margin-top:1px}
  .data-table{width:100%;border-collapse:collapse;font-size:11.5px}
  .data-table th{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);text-align:left;padding:3px 5px;border-bottom:1px solid var(--border-strong);letter-spacing:1px}
  .data-table td{padding:3px 5px;border-bottom:1px solid var(--border);color:var(--text-muted);vertical-align:top}
  .data-table tr:last-child td{border-bottom:none}
  @media(max-width:700px){.cols-3{grid-template-columns:1fr 1fr}}
  @media(max-width:500px){.cols-2,.cols-3{grid-template-columns:1fr}.stat-grid,.location-grid{grid-template-columns:1fr}}
</style>

<div class="screen">
  <div class="screen-header">
    <h1>MOTHERSHIP <span class="blink">▮</span> WARDEN SCREEN</h1>
    <p>// PROSPERO'S DREAM — A POUND OF FLESH // 1E RULES REFERENCE //</p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<script>
const panels = {
  rules: `<div class="col-grid cols-3">
    <div class="card"><h3>Core Resolution</h3>
      <div class="rule-row"><span class="rule-label">ROLL UNDER</span><span class="rule-val">Roll d100 under Stat or Save to succeed</span></div>
      <div class="rule-row"><span class="rule-label">SKILL BONUS</span><span class="rule-val">Trained +10 / Expert +15 / Master +20 (added to Stat before rolling)</span></div>
      <div class="rule-row"><span class="rule-label">ADVANTAGE [+]</span><span class="rule-val">Roll twice, take better result</span></div>
      <div class="rule-row"><span class="rule-label">DISADVANTAGE [-]</span><span class="rule-val">Roll twice, take worse result</span></div>
      <div class="rule-row"><span class="rule-label">90–99</span><span class="rule-val">Always a failure regardless of stat</span></div>
      <div class="rule-row"><span class="rule-label">CRITICAL SUCCESS</span><span class="rule-val">Doubles on a successful roll — something very good happens</span></div>
      <div class="rule-row"><span class="rule-label">CRITICAL FAILURE</span><span class="rule-val">Doubles on a failed roll — trigger Panic Check</span></div>
      <div class="rule-row"><span class="rule-label">THRILLIN' HEROICS</span><span class="rule-val">Roll a Firefly (6 on die) — keep rolling, keep succeeding</span></div>
      <div class="info-box" style="margin-top:6px"><strong>WHEN TO ROLL:</strong> Only roll when failure is interesting. The best play is to avoid rolling entirely — have the right tool, right plan, right crew.</div>
    </div>
    <div class="card"><h3>Stress & Panic</h3>
      <div class="rule-row"><span class="rule-label">GAIN STRESS</span><span class="rule-val">On any failed roll. Also from specific events and wounds.</span></div>
      <div class="rule-row"><span class="rule-label">PANIC CHECK</span><span class="rule-val">Triggered by Critical Failure. Roll d20 Panic Die.</span></div>
      <div class="rule-row"><span class="rule-label">PANIC RESULT</span><span class="rule-val">If d20 ≤ current Stress → consult Panic Table (PSG p.21)</span></div>
      <div class="rule-row"><span class="rule-label">MARINES</span><span class="rule-val">When Marine panics, ALL close friendlies make Fear Save</span></div>
      <div class="rule-row"><span class="rule-label">ANDROIDS</span><span class="rule-val">Close friendlies at [-] on all rolls while Android is near</span></div>
      <div class="rule-row"><span class="rule-label">RELIEVE STRESS</span><span class="rule-val">Rest in safe area — roll worst Save to reduce by a few points</span></div>
      <div class="rule-row"><span class="rule-label">SHORE LEAVE</span><span class="rule-val">Convert Stress into improved Saves. Treat Conditions. Train skills.</span></div>
      <div class="warn-box" style="margin-top:5px"><strong>STRESS → PANIC → DEATH:</strong> Failure causes Stress, Stress makes Panic more likely, Panic causes Conditions. Horror is procedural — let it escalate.</div>
    </div>
    <div class="card"><h3>Health & Wounds</h3>
      <div class="rule-row"><span class="rule-label">HEALTH</span><span class="rule-val">1d10+10. Resets to max each Wound. Starts at max, zero Wounds.</span></div>
      <div class="rule-row"><span class="rule-label">WOUNDS</span><span class="rule-val">Start at 2 max. When Health hits 0 → suffer a Wound. Reset Health.</span></div>
      <div class="rule-row"><span class="rule-label">WOUND TABLE</span><span class="rule-val">Roll on Wounds Table (PSG p.29) per Wound category taken</span></div>
      <div class="rule-row"><span class="rule-label">ARMOR POINTS</span><span class="rule-val">Damage under AP = ignored. Damage over AP = Armor destroyed, full damage taken</span></div>
      <div class="rule-row"><span class="rule-label">DEATH SAVE</span><span class="rule-val">When out of Wounds — roll 1d10 under a cup. Hidden result.</span></div>
      <div class="rule-row"><span class="rule-label">BLEEDING</span><span class="rule-val">1 DMG/round until stopped. Cumulative (Bleeding +2 = 3 DMG/round)</span></div>
      <div class="rule-row"><span class="rule-label">COVER</span><span class="rule-val">Acts like Armor (AP 5 for insignificant; more for solid). Destroyed like Armor.</span></div>
      <div class="info-box" style="margin-top:5px"><strong>CLASSES START WITH:</strong> Wounds 2 / Min Stress 2 / Health 1d10+10. Marines get extra Wound from their class skill tree.</div>
    </div>
  </div>`,

  combat: `<div class="col-grid cols-3">
    <div class="card"><h3>Combat Sequence</h3>
      <ul class="step-list">
        <li><span class="step-num">1</span><span><strong>Declare:</strong> Everyone declares actions before rolling. No take-backs.</span></li>
        <li><span class="step-num">2</span><span><strong>Speed Save:</strong> Highest Speed acts first (no initiative roll — Speed Save determines order if contested).</span></li>
        <li><span class="step-num">3</span><span><strong>Attack:</strong> Roll Combat Stat (+ skill bonus) to hit. Success = roll damage.</span></li>
        <li><span class="step-num">4</span><span><strong>Damage:</strong> Reduce target's Health. If Health hits 0, suffer a Wound and reset Health minus carryover damage.</span></li>
        <li><span class="step-num">5</span><span><strong>Armor:</strong> Attacker hits with damage less than AP — ignored. Damage ≥ AP — Armor gone, take full damage.</span></li>
        <li><span class="step-num">6</span><span><strong>Actions:</strong> 2 actions per round. Attack, Move, Aim, Reload, First Aid, Use Item, etc.</span></li>
      </ul>
      <div class="warn-box"><strong>VIOLENCE IS A TRAP:</strong> Characters die fast. A good plan avoids combat. A bad plan ends careers.</div>
    </div>
    <div class="card"><h3>Weapons Quick Ref</h3>
      <table class="data-table">
        <tr><th>Weapon</th><th>DMG</th><th>Range</th><th>Notes</th></tr>
        <tr><td>Crowbar</td><td>1d5</td><td>Adjacent</td><td>Blunt Force. [+] on Strength checks to open things.</td></tr>
        <tr><td>Boarding Axe</td><td>2d10</td><td>Adjacent</td><td>Gore [+]</td></tr>
        <tr><td>Combat Shotgun</td><td>4d10</td><td>Close</td><td>1d10 DMG at Long Range+. 4 shots.</td></tr>
        <tr><td>Stun Baton</td><td>Special</td><td>Adjacent</td><td>Body Save or Stunned</td></tr>
        <tr><td>Loader Claws</td><td>1 Wound</td><td>Adjacent</td><td>Exoskeleton. 4 arms. 5000kg lift. 48hr battery.</td></tr>
        <tr><td>Breaching Charge</td><td>1 Wound</td><td>Blast</td><td>Body Save or Wound (Explosive). Blows airlocks.</td></tr>
      </table>
      <div class="divider"></div>
      <div class="rule-row"><span class="rule-label">RANGES</span><span class="rule-val">Close (can touch/reach) → Long (20–100m) → Extreme (100m+)</span></div>
      <div class="rule-row"><span class="rule-label">CRIT HIT</span><span class="rule-val">Doubles on successful Combat roll — roll on crit table (Warden's Screen)</span></div>
    </div>
    <div class="card"><h3>NPCs & Creatures</h3>
      <div class="rule-row"><span class="rule-label">COMBAT</span><span class="rule-val">NPCs use their Combat stat for all attacks</span></div>
      <div class="rule-row"><span class="rule-label">INSTINCT</span><span class="rule-val">Used for all non-combat checks (Fear, Sanity, Body, Speed, Intellect)</span></div>
      <div class="rule-row"><span class="rule-label">MAX WOUNDS</span><span class="rule-val">Any damage taken = 1 Wound (for most creatures). Check stat block.</span></div>
      <div class="rule-row"><span class="rule-label">LOYALTY SAVE</span><span class="rule-val">Rolled when NPC must choose between self-interest and mission</span></div>
      <div class="rule-row"><span class="rule-label">CHOKESPAWN</span><span class="rule-val">ACMD Phase 3 horror. Created from infected humans. Body Save on contact or take Infection Check.</span></div>
      <div class="divider"></div>
      <div class="rule-row"><span class="rule-label">LOSHE (Dockmaster)</span><span class="rule-val">C:55 / I:60 / W:3(40) — Exoskeleton, 4 arms, each attacks separately. Worth 300kcr. Reapable.</span></div>
      <div class="rule-row"><span class="rule-label">Babushka</span><span class="rule-val">C:65 / I:— / W:2(45) — Cyber Savant: On hit, shuts down one target cybermod for the encounter.</span></div>
      <div class="info-box" style="margin-top:5px"><strong>Toxic/Vacuum:</strong> No rebreather = 1d10 DMG/round. Body Save halves it. Androids don't need oxygen.</div>
    </div>
  </div>`,

  dream: `<div class="col-grid cols-2">
    <div class="card">
      <h3>Prospero's Dream — Locations</h3>
      <div class="location-grid">
        <div class="loc-item"><span class="loc-name">THE RECOVERY ROOM</span><span class="loc-desc">Babushka's clinic. Legendary cybersurgeon. 100cr/day. Zhenya (AI child) handles bedside manner. ACMD quarantine in OR-7.</span></div>
        <div class="loc-item"><span class="loc-name">THE FARM</span><span class="loc-desc">Evangelical Solarian Church production facility. Sycorax manufactured here. Managed by Ukko/Ukka. Do NOT talk to anyone else.</span></div>
        <div class="loc-item"><span class="loc-name">THE CHOKE</span><span class="loc-desc">The lowest, darkest level of the Dream. ACMD epicenter. Dr. Bancali operates here illegally. Chokespawn lurk in the muck.</span></div>
        <div class="loc-item"><span class="loc-name">DOPTOWN</span><span class="loc-desc">Black market district. Imogene Kane rumored here. Find Dr. Bancali through asking around. Dangerous territory.</span></div>
        <div class="loc-item"><span class="loc-name">THE ICE BOX</span><span class="loc-desc">Private slickworld servers. Hideo Kieslowski hiding here for a decade. Reclusive genius needed for ACMD outbreak.</span></div>
        <div class="loc-item"><span class="loc-name">THE DOCKS</span><span class="loc-desc">X-Class port. Repairs 2x normal cost. 50% down required. 1d5x turnaround. 10% chance cargo stolen. Loshe oversees everything.</span></div>
        <div class="loc-item"><span class="loc-name">LOCAL 32819L</span><span class="loc-desc">Teamster union hall. Reidmar runs it. Strike organizing happening. Kleyman (informant) also here.</span></div>
        <div class="loc-item"><span class="loc-name">GOLYONOVO BRATVA HQ</span><span class="loc-desc">Yandee's operation. Droogs (street soldiers) recruited here. Secret: Yandee is an android.</span></div>
      </div>
    </div>
    <div class="card">
      <h3>Key NPCs</h3>
      <table class="data-table">
        <tr><th>NPC</th><th>Faction</th><th>Need to Know</th></tr>
        <tr><td>Yandee</td><td>Bratva (boss)</td><td>Head of Golyonovo II Bratva. SECRET: is an android. Reidmar wants to use this as leverage.</td></tr>
        <tr><td>Reidmar</td><td>Teamsters (boss)</td><td>Head of Local 32819L. Ambitious. His freighters captured by Stratemeyer Syndicate. Conspires with Babushka.</td></tr>
        <tr><td>Cutter</td><td>Tempest Co. (cmdr)</td><td>Mercenary commander. Suspicious of Yandee. Looking to overthrow them. Possible alliance target.</td></tr>
        <tr><td>Babushka</td><td>Independent surgeon</td><td>Legendary cybermod surgeon. Clinically detached. Investigating ACMD. Zhenya is her AI child avatar.</td></tr>
        <tr><td>Ukko/Ukka</td><td>The Farm / Solarians</td><td>Run Sycorax production. Hunglung sympathizer. Only contact for Sycorax pickup.</td></tr>
        <tr><td>Loshe</td><td>Dockmaster</td><td>Oversees all ships. Exoskeleton-equipped. 4 arms. Every incoming crew goes through them.</td></tr>
        <tr><td>Kleyman</td><td>Bratva informant</td><td>Novo informant in the union. Organizing scab labor against potential strike.</td></tr>
        <tr><td>Dr. Bancali</td><td>Independent (Choke)</td><td>Rogue doctor modding patients illegally in The Choke. Knows about ACMD.</td></tr>
        <tr><td>H. Kieslowski</td><td>Independent (Ice Box)</td><td>Reclusive genius. In slickworld for 10+ years. Key to solving ACMD. Hard to reach.</td></tr>
        <tr><td>Imogene Kane</td><td>Independent</td><td>Rumored in Doptown. Planning an uprising. Valuable contact (50kcr mission fee).</td></tr>
      </table>
      <div class="info-box" style="margin-top:6px"><strong>DENIZENS TABLE:</strong> All NPCs have their own agendas and problems. Ask "what do they want?" before every scene. The Dream breathes because everyone has skin in the game.</div>
    </div>
  </div>`,

  factions: `<div class="col-grid cols-3">
    <div class="card">
      <h3>Faction Web</h3>
      <div class="faction-item"><span class="faction-name">GOLYONOVO II BRATVA</span><span class="faction-desc">The overarching crime org. Yandee leads. Controls distribution, muscle, and the church. Everyone answers to them — or pretends to.</span></div>
      <div class="faction-item"><span class="faction-name">TEAMSTERS — LOCAL 32819L</span><span class="faction-desc">Drug distribution network for the Bratva. Reidmar runs the union. Strike looming. Fleet captured by Stratemeyer Syndicate.</span></div>
      <div class="faction-item"><span class="faction-name">TEMPEST CO.</span><span class="faction-desc">Bratva's hired muscle. Commander Cutter runs it. Growing suspicious of Yandee. Could be flipped or could go rogue.</span></div>
      <div class="faction-item"><span class="faction-name">EVANGELICAL SOLARIANS</span><span class="faction-desc">The station's church. Produces Sycorax (cash-crop drug) at The Farm. Appear devout, serve the Bratva. Ukko/Ukka manage operations.</span></div>
      <div class="faction-item"><span class="faction-name">STRATEMEYER SYNDICATE</span><span class="faction-desc">Rival crime org. Captured Reidmar's freighter fleet. Holding Teamsters hostage. Main external pressure point driving the timeline.</span></div>
      <div class="info-box" style="margin-top:5px"><strong>THE CRACKS:</strong> Every faction is at each other's throats. PCs live in those cracks. Play factions against each other, collect favors, survive the fallout.</div>
    </div>
    <div class="card">
      <h3>Timeline of Events</h3>
      <p class="note" style="margin-bottom:6px">// THESE HAPPEN IF PCs DO NOTHING //</p>
      <div class="phase-row phase-1">
        <span class="phase-label">PHASE 1 — TENSION</span>
        Stratemeyer captures Reidmar's fleet. He demands Yandee send Tempest Co. to recover them. Yandee stalls. Reidmar threatens a general strike. First Chokespawn caught on camera.
      </div>
      <div class="phase-row phase-2">
        <span class="phase-label">PHASE 2 — BREAKING POINT</span>
        Stratemeyer executes captured Teamsters on camera. Reidmar calls the strike. Yandee imports scabs (Kleyman organizing this). Tempest acts as strikebreakers. O2 debt in The Choke called in — pay in 24hrs or bombings begin. 2d100 die in bombings.
      </div>
      <div class="phase-row phase-3">
        <span class="phase-label">PHASE 3 — COLLAPSE</span>
        Full war between Teamsters and Tempest Co. Mysterious figures roaming slickworlds. 2d10 die in strange circumstances. ACMD plague spreads openly. Reports Chokespawn came from the plague. Caliban stirs in OR-7.
      </div>
      <div class="warn-box" style="margin-top:6px"><strong>SYCORAX:</strong> The drug makes cybermod installation painless and easy. This is important — it's why the station functions. Without it, mods become dangerous to install.</div>
    </div>
    <div class="card">
      <h3>ACMD Infection</h3>
      <div class="rule-row"><span class="rule-label">INFECTION CHECK</span><span class="rule-val">Body Save when exposed. Fail = infected. Track infection level 01–10.</span></div>
      <div class="rule-row"><span class="rule-label">SPREADING</span><span class="rule-val">Infected can spread ACMD to others within 10m (Body Save or check)</span></div>
      <div class="rule-row"><span class="rule-label">TREATMENT</span><span class="rule-val">Babushka's Recovery Room. Rest + Body Save to reduce infection by 1.</span></div>
      <div class="rule-row"><span class="rule-label">CRIT SUCCESS (treat)</span><span class="rule-val">Reduce infection by 1d5 on treatment critical success</span></div>
      <div class="rule-row"><span class="rule-label">CRIT FAILURE (treat)</span><span class="rule-val">Infection increases by 1d5</span></div>
      <div class="divider"></div>
      <p class="note" style="margin-bottom:5px">// ACMD PROGRESSION TABLE //</p>
      <table class="data-table">
        <tr><th>Level</th><th>Effect</th></tr>
        <tr><td>01</td><td>All Body Saves at [-]</td></tr>
        <tr><td>02</td><td>Body Save or coughing fit 1d5 rds. Others within 10m make Infection Check</td></tr>
        <tr><td>03</td><td>Fever & Chills. 1d10 DMG per day</td></tr>
        <tr><td>04</td><td>Random Mutation</td></tr>
        <tr><td>05</td><td>Frailty. All Strength & Speed Checks at [-]. Mutation.</td></tr>
        <tr><td>06</td><td>2d10 DMG per day. Random Malfunction</td></tr>

const tabs = [
  {id:'rules', label:'Core Rules'},
  {id:'combat', label:'Combat'},
  {id:'dream', label:"Prospero's Dream"},
  {id:'factions', label:'Factions & Timeline'},
  {id:'cybermods', label:'Mods, Jobs & Saves'},
];

const tc = document.getElementById('tabs');
const pc = document.getElementById('panels');
tabs.forEach((t,i)=>{
  const b = document.createElement('button');
  b.className='tab-btn'+(i===0?' active':'');
  b.textContent=t.label;
  b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('p-'+t.id).classList.add('active');
  };
  tc.appendChild(b);
  const p=document.createElement('div');
  p.className='panel'+(i===0?' active':'');
  p.id='p-'+t.id;
  p.innerHTML=panels[t.id];
  pc.appendChild(p);
});
</script>
